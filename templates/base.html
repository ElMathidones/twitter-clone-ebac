<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Twitter Clone EBAC</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="navbar">
        <a href="{% url 'feed' %}" class="logo">Twitter Clone</a>

        <nav>
            {% if user.is_authenticated %}
                <a href="{% url 'feed' %}">Feed</a>
                <a href="{% url 'profile' user.username %}">Meu perfil</a>
                <a href="{% url 'edit_profile' %}">Editar perfil</a>

                <form action="{% url 'logout' %}" method="post" class="logout-form">
                    {% csrf_token %}
                    <button type="submit">Sair</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Entrar</a>
                <a href="{% url 'signup' %}">Cadastrar</a>
            {% endif %}
        </nav>
    </header>

    <main class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <p class="message">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
