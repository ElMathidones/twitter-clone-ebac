{% extends 'base.html' %}

{% block content %}
<section class="card">
    <h1>Excluir postagem</h1>

    <p>Tem certeza que deseja excluir esta postagem?</p>

    <article class="post-card">
        <p class="post-content">{{ post.content|linebreaksbr }}</p>
    </article>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="danger-button">Confirmar exclusão</button>
        <a href="{% url 'profile' user.username %}" class="button-link secondary">Cancelar</a>
    </form>
</section>
{% endblock %}
