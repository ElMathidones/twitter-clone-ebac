{% extends 'base.html' %}

{% block content %}
<section class="card">
    <h1>Editar postagem</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Salvar alterações</button>
        <a href="{% url 'profile' user.username %}" class="button-link secondary">Cancelar</a>
    </form>
</section>
{% endblock %}
